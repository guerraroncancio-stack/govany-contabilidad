<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSSGIO SOLUTIONS S.A.S.</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
}
</style>
</head>

<body class="text-white">

<!-- NAV -->
<header class="bg-black p-4 flex justify-between">
  <h1 class="font-bold">OSSGIO SOLUTIONS</h1>
  <a href="#contacto" class="bg-blue-600 px-4 py-2 rounded">Contacto</a>
</header>

<!-- HERO -->
<section class="text-center py-20">
  <img src="https://api.dix.lat/media2/1776703414770.jpg" class="mx-auto w-40 rounded mb-6">
  <h2 class="text-4xl font-black">Soluciones Contables</h2>
  <p class="mt-4 text-white/70">Impulsa tu empresa con expertos</p>

  <a href="https://wa.me/573123437850" target="_blank"
  class="inline-block mt-6 bg-green-500 px-6 py-3 rounded font-bold">
  WhatsApp
  </a>
</section>

<!-- SERVICIOS -->
<section class="py-20 text-center">
  <h2 class="text-3xl font-bold mb-10">Servicios</h2>

  <div class="grid md:grid-cols-3 gap-6 px-6">
    
    <div class="bg-white/5 p-6 rounded">
      <h3 class="font-bold text-blue-400">Outsourcing</h3>
      <p class="text-sm mt-3">Contabilidad completa</p>
    </div>

    <div class="bg-white/5 p-6 rounded">
      <h3 class="font-bold text-blue-400">Auditoría</h3>
      <p class="text-sm mt-3">Control y confianza</p>
    </div>

    <div class="bg-white/5 p-6 rounded">
      <h3 class="font-bold text-blue-400">SG-SST</h3>
      <p class="text-sm mt-3">Implementación</p>
    </div>

  </div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="py-20 px-6 max-w-xl mx-auto">

<h2 class="text-3xl font-bold mb-6 text-center">Contacto</h2>

<form id="form">

<input type="text" name="name" placeholder="Nombre"
class="w-full mb-4 p-4 rounded bg-black border border-white/20" required>

<input type="email" name="email" placeholder="Correo"
class="w-full mb-4 p-4 rounded bg-black border border-white/20" required>

<textarea name="message" placeholder="Mensaje"
class="w-full mb-4 p-4 rounded bg-black border border-white/20" required></textarea>

<button class="w-full bg-blue-600 py-4 rounded font-bold">
Enviar
</button>

<p id="status" class="mt-4 text-center"></p>

</form>

</section>

<!-- FOOTER -->
<footer class="text-center py-10 text-white/50">
© OSSGIO SOLUTIONS
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();

(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",this)
.then(()=>{
document.getElementById("status").innerText="Mensaje enviado ✅";
this.reset();
},()=>{
document.getElementById("status").innerText="Error al enviar ❌";
});
});
</script>

</body>
</html>
